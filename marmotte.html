<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Fuite de la Marmotte 3D</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: #2c3e50; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        h1 { color: #ecf0f1; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 5px; }
        .controls-info { color: #bdc3c7; margin-bottom: 15px; font-size: 14px; }
        
        #gameContainer {
            position: relative;
        }
        
        #gameCanvas {
            background: #87CEEB; /* Ciel de base, géré par le JS ensuite */
            border: 4px solid #34495e;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
        }

        #scoreBoard {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
        }

        .btn-back {
            margin-top: 20px;
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-back:hover { background: #c0392b; }
        
        #overlayScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            display: none;
        }
        
        #overlayScreen h2 { color: #e74c3c; font-size: 32px; margin: 0 0 10px 0; text-shadow: 2px 2px 4px #000; }
        #overlayScreen p { font-size: 20px; margin-bottom: 20px; }
        .btn-play {
            padding: 12px 25px; font-size: 18px; cursor: pointer; 
            background: #2ecc71; color: white; border: none; 
            border-radius: 8px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .btn-play:hover { background: #27ae60; transform: scale(1.05); }
        
        /* Contrôles tactiles pour mobile */
        #touchControls {
            display: none; width: 800px; max-width: 100%; justify-content: space-between; margin-top: 10px;
        }
        .touch-btn { flex: 1; padding: 15px; margin: 0 5px; background: rgba(255,255,255,0.2); border: 2px solid #fff; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; text-align: center; }
        @media (max-width: 800px) { #touchControls { display: flex; } }
    </style>
</head>
<body>

    <h1>⛰️ La Fuite de la Marmotte</h1>
    <div class="controls-info">⬅️ ➡️ pour esquiver les arbres | ESPACE pour sauter les rochers</div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="scoreBoard">Distance: <span id="score">0</span>m</div>
        
        <div id="overlayScreen">
            <h2 id="overlayTitle">Aïe, attrapée par l'aigle !</h2>
            <p>Score final : <span id="finalScore">0</span>m</p>
            <button class="btn-play" onclick="initGame()">Rejouer</button>
        </div>
    </div>

    <div id="touchControls">
        <div class="touch-btn" onclick="moveLeft()">◀ Gauche</div>
        <div class="touch-btn" onclick="jump()">Sauter ⬆</div>
        <div class="touch-btn" onclick="moveRight()">Droite ▶</div>
    </div>

    <a href="index.html" class="btn-back">Retour à l'Atlas</a>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Paramètres de la perspective 3D
        const FOV = 350; // Champ de vision
        const HORIZON_Y = 180; // Ligne d'horizon
        const CAMERA_Y = 250; // Hauteur de la caméra
        
        // Variables globales du jeu
        let state = 'INTRO'; // 'INTRO', 'PLAY', 'GAMEOVER'
        let frames = 0;
        let score = 0;
        let speed = 15; // Vitesse d'avancement
        let zOffset = 0; // Pour l'effet de défilement du sol
        
        // Lignes de course (Gauche, Centre, Droite)
        const LANES = [-250, 0, 250];

        // --- ENTITÉS ---
        let player = {
            lane: 1, // 0 = gauche, 1 = centre, 2 = droite
            x: 0, // Position X lissée
            y: 0, // Hauteur du saut (0 = sol, négatif = en l'air)
            vy: 0,
            z: 150, // Distance fixe par rapport à la caméra
            grounded: true,
            shake: 0 // Pour l'animation d'intro
        };

        let eagle = {
            x: 0,
            y: -400, // Commence très haut pour l'intro
            z: 80
        };

        let obstacles = [];
        let particles = [];

        // --- CONTRÔLES ---
        window.addEventListener('keydown', function (e) {
            if (state !== 'PLAY') return;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft();
            if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight();
            if (e.code === 'Space' || e.code === 'ArrowUp') jump();
        });

        function moveLeft() { if (player.lane > 0) player.lane--; }
        function moveRight() { if (player.lane < 2) player.lane++; }
        function jump() {
            if (player.grounded) {
                player.vy = -20; // Force du saut
                player.grounded = false;
            }
        }

        // --- MATHS 3D ---
        // Convertit les coordonnées 3D (X, Y, Z) en 2D (x, y, echelle) pour l'écran
        function project(x, y, z) {
            if (z < 1) z = 1; // Évite la division par zéro
            const scale = FOV / (FOV + z);
            const projX = (canvas.width / 2) + (x * scale);
            const projY = HORIZON_Y + ((y + CAMERA_Y) * scale);
            return { x: projX, y: projY, scale: scale };
        }

        // --- DESSIN DES DÉCORS STATIQUES ---
        function drawBackground() {
            // Ciel
            let gradient = ctx.createLinearGradient(0, 0, 0, HORIZON_Y);
            gradient.addColorStop(0, '#4facfe');
            gradient.addColorStop(1, '#00f2fe');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, HORIZON_Y);

            // Soleil
            ctx.fillStyle = "#f1c40f";
            ctx.beginPath();
            ctx.arc(600, 80, 40, 0, Math.PI * 2);
            ctx.fill();

            // Montagnes stylisées
            ctx.fillStyle = "#7f8c8d";
            ctx.beginPath();
            ctx.moveTo(0, HORIZON_Y);
            ctx.lineTo(150, 50);
            ctx.lineTo(300, HORIZON_Y);
            ctx.lineTo(500, 80);
            ctx.lineTo(800, 30);
            ctx.lineTo(800, HORIZON_Y);
            ctx.fill();
            
            // Neige sur les montagnes
            ctx.fillStyle = "#ecf0f1";
            ctx.beginPath();
            ctx.moveTo(150, 50);
            ctx.lineTo(110, 85);
            ctx.lineTo(150, 95);
            ctx.lineTo(190, 85);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(800, 30);
            ctx.lineTo(750, 70);
            ctx.lineTo(800, 80);
            ctx.fill();
        }

        function drawGround() {
            // Fond vert de base
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(0, HORIZON_Y, canvas.width, canvas.height - HORIZON_Y);

            // Lignes du damier/vitesse pour l'illusion 3D
            const stripeWidth = 400; // Taille d'une bande sur l'axe Z
            for (let z = 0; z < 2000; z += stripeWidth) {
                // On ajoute le zOffset pour que le sol avance
                let currentZ = z - (zOffset % stripeWidth);
                if (currentZ < 0) currentZ += 2000;

                // Alternance de couleur du sol
                ctx.fillStyle = (Math.floor(z / stripeWidth) % 2 === 0) ? "#27ae60" : "#2ecc71";

                let p1 = project(-2000, 0, currentZ);
                let p2 = project(2000, 0, currentZ);
                let p3 = project(2000, 0, currentZ + stripeWidth);
                let p4 = project(-2000, 0, currentZ + stripeWidth);

                if(p1.y > HORIZON_Y) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.lineTo(p3.x, p3.y);
                    ctx.lineTo(p4.x, p4.y);
                    ctx.fill();
                }
            }

            // Dessiner les limites des voies
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.lineWidth = 2;
            [-125, 125].forEach(x => {
                ctx.beginPath();
                for (let z = 0; z <= 2000; z += 100) {
                    let p = project(x, 0, z);
                    z === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            });
        }

        // --- GESTION DU JEU ---
        function handleObstacles() {
            if (frames % 30 === 0 && Math.random() > 0.3) {
                // Création d'un obstacle loin devant
                let lane = Math.floor(Math.random() * 3); // 0, 1 ou 2
                // S'assurer qu'il y a toujours un chemin (pas 3 arbres côte à côte)
                let type = Math.random() > 0.4 ? "tree" : "rock";
                
                obstacles.push({
                    lane: lane,
                    x: LANES[lane],
                    y: 0,
                    z: 2500, // Loin à l'horizon
                    type: type,
                    passed: false
                });
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.z -= speed;

                // Détection de collision
                // L'obstacle est au même niveau de profondeur que le joueur
                if (obs.z > player.z - 50 && obs.z < player.z + 50) {
                    if (obs.lane === Math.round(player.x / 250 + 1)) { // Joueur sur la même voie
                        if (obs.type === "tree") {
                            // Arbre = Impossible de sauter par dessus
                            gameOver();
                        } else if (obs.type === "rock") {
                            // Rocher = On peut sauter par dessus
                            // Si la position Y du joueur (négative) n'est pas assez haute
                            if (player.y > -80) gameOver();
                        }
                    }
                }

                if (obs.z < 0) {
                    obstacles.splice(i, 1); // Supprime l'obstacle dépassé
                }
            }
        }

        function drawEntities() {
            // Regrouper toutes les entités à dessiner pour les trier par profondeur (Z)
            let renderList = [];

            // Obstacles
            obstacles.forEach(obs => {
                renderList.push({ ...obs, emoji: obs.type === "tree" ? "🌲" : "🪨", size: obs.type === "tree" ? 120 : 60, isPlayer: false });
            });

            // Marmotte
            renderList.push({ x: player.x, y: player.y, z: player.z, emoji: "🦫", size: 80, isPlayer: true });

            // Aigle
            renderList.push({ x: eagle.x, y: eagle.y, z: eagle.z, emoji: "🦅", size: 150, isPlayer: false, isEagle: true });

            // Tri de Z le plus grand (loin) au plus petit (proche) - Algorithme du peintre
            renderList.sort((a, b) => b.z - a.z);

            ctx.textAlign = "center";
            ctx.textBaseline = "bottom"; // Important pour que l'emoji repose sur le sol

            renderList.forEach(item => {
                if (item.z <= 0) return; // Derrière la caméra

                let p = project(item.x, item.y, item.z);
                let visualSize = item.size * p.scale;

                ctx.save();
                ctx.translate(p.x, p.y);

                // Animations spécifiques
                if (item.isPlayer) {
                    if (state === 'INTRO') {
                        // Tremblement
                        ctx.translate(item.shake, 0);
                    } else if (state === 'PLAY' && player.grounded) {
                        // Balancement de la course
                        ctx.rotate(Math.sin(frames * 0.4) * 0.2);
                        // Sauts légers de course
                        ctx.translate(0, -Math.abs(Math.sin(frames * 0.4) * 10) * p.scale);
                    }
                } else if (item.isEagle) {
                    // Mouvement de vol de l'aigle
                    ctx.rotate(Math.sin(frames * 0.1) * 0.1);
                    ctx.translate(0, Math.sin(frames * 0.2) * 10 * p.scale);
                }

                ctx.font = Math.floor(visualSize) + "px Arial";
                
                // Ombre au sol (sauf pour l'aigle en l'air)
                if(!item.isEagle || state === 'GAMEOVER') {
                   ctx.fillStyle = "rgba(0,0,0,0.3)";
                   ctx.beginPath();
                   ctx.ellipse(0, 0, visualSize * 0.4, visualSize * 0.1, 0, 0, Math.PI * 2);
                   ctx.fill();
                }

                // Dessin de l'emoji
                ctx.fillText(item.emoji, 0, 0);
                ctx.restore();
            });
        }

        function updateLogic() {
            if (state === 'INTRO') {
                // Cinématique de début
                player.x = LANES[1]; // Centré
                eagle.x = 0;
                
                if (frames < 60) {
                    // L'aigle descend du ciel
                    eagle.y += ( (-100) - eagle.y ) * 0.05;
                } else if (frames < 120) {
                    // La marmotte tremble
                    player.shake = Math.sin(frames * 2) * 5;
                } else {
                    // Début du jeu
                    player.shake = 0;
                    state = 'PLAY';
                }
                return;
            }

            if (state === 'PLAY') {
                // Mouvement fluide latéral du joueur
                let targetX = LANES[player.lane];
                player.x += (targetX - player.x) * 0.2;

                // Gravité et saut
                player.y += player.vy;
                if (!player.grounded) {
                    player.vy += 1.5; // Gravité
                    if (player.y >= 0) {
                        player.y = 0;
                        player.grounded = true;
                        player.vy = 0;
                    }
                }

                // Mouvement de l'aigle (suit le joueur de façon menaçante)
                eagle.x += (player.x - eagle.x) * 0.05;
                eagle.y = -150 + Math.sin(frames * 0.05) * 30; // Oscille en hauteur

                // Gestion du monde
                zOffset += speed;
                score += (speed / 100);
                document.getElementById("score").innerText = Math.floor(score);
                
                if (frames % 600 === 0) speed += 1; // Accélération progressive

                handleObstacles();
            }
        }

        function gameOver() {
            state = 'GAMEOVER';
            document.getElementById("overlayScreen").style.display = "flex";
            document.getElementById("finalScore").innerText = Math.floor(score);
            // L'aigle attrape la marmotte
            eagle.x = player.x;
            eagle.y = player.y - 50;
            eagle.z = player.z;
        }

        function initGame() {
            state = 'INTRO';
            frames = 0;
            score = 0;
            speed = 15;
            zOffset = 0;
            obstacles = [];
            
            player.lane = 1;
            player.y = 0;
            player.vy = 0;
            player.grounded = true;
            
            eagle.y = -500; // Repart d'en haut
            eagle.z = 80; // Légèrement derrière la marmotte (qui est à 150)
            
            document.getElementById("overlayScreen").style.display = "none";
            document.getElementById("score").innerText = "0";
        }

        function gameLoop() {
            frames++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updateLogic();

            drawBackground();
            drawGround();
            drawEntities();

            requestAnimationFrame(gameLoop);
        }

        // Lancement initial
        initGame();
        gameLoop();

    </script>
</body>
</html>
