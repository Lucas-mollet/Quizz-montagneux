<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Fuite de la Marmotte - Tout Schuss !</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: #87CEEB; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        h1 { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 60%, #FFFFFF 100%); /* Ciel vers neige */
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            max-width: 100%;
        }
        #scoreBoard {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: none;
        }
    </style>
</head>
<body>

    <h1>⛷️ La Marmotte Tout Schuss !</h1>
    <div id="scoreBoard">Score : <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="800" height="300"></canvas>
    
    <div id="gameOverScreen">
        <h2 style="color: #c62828;">Aïe, attrapée par l'aigle !</h2>
        <p>Score final : <span id="finalScore">0</span></p>
        <button style="padding:10px 20px; font-size:18px; cursor:pointer; background:#2e7d32; color:white; border:none; border-radius:8px;" onclick="resetGame()">Rejouer</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Paramètres de perspective pour la pente
        const HORIZON_Y = 120; // Plus bas pour plus de pente
        const CAMERA_Y = 220; // Caméra plus haute
        
        // Variables du jeu
        let frames = 0;
        let score = 0;
        let gameSpeed = 5;
        let isGameOver = false;

        // --- CHARGEMENT DES IMAGES (C'est ici que tu dois t'assurer d'avoir de VRAIS fichiers) ---
        const imgMarmotte = new Image();
        imgMarmotte.src = "marmotte.png"; // Assure-toi que c'est un VRAI fichier PNG
        
        const imgAigle = new Image();
        imgAigle.src = "aigle.png"; // Assure-toi que tu as aussi un fichier pour l'aigle

        // Tableau pour stocker les particules de neige
        let snowParticles = [];

        // La Marmotte de face sur skis
        const marmotte = {
            x: 50,
            y: HORIZON_Y + 50, // Placer la marmotte sur le sol, plus bas
            size: 60, // Taille un peu plus grande pour les skis
            dy: 0,
            jumpForce: 18, // Sauts durent plus longtemps (force augmentée)
            grounded: false,
        };

        const gravity = 0.4; // Gravité diminuée pour que les sauts durent plus longtemps
        let obstacles = [];

        // Écouteurs pour sauter (Espace ou clic sur l'écran)
        window.addEventListener('keydown', function (e) {
            if (e.code === 'Space') {
                if (isGameOver) resetGame();
                else jump();
            }
        });
        canvas.addEventListener('touchstart', function() {
            if (isGameOver) resetGame();
            else jump();
        });
        canvas.addEventListener('mousedown', function() {
            if (isGameOver) resetGame();
            else jump();
        });

        function jump() {
            if (marmotte.grounded) {
                marmotte.dy = -marmotte.jumpForce;
                marmotte.grounded = false;
            }
        }

        // --- Gestion des particules de neige ---
        function handleSnow() {
            // Si la marmotte est au sol, générer de la neige derrière les skis
            if (marmotte.grounded) {
                for (let i = 0; i < 3; i++) { // Générer 3 particules par frame
                    snowParticles.push({
                        x: marmotte.x + marmotte.size / 2 + (Math.random() - 0.5) * 10, // Juste derrière les skis
                        y: marmotte.y + marmotte.size - 5, // Au niveau du sol
                        vx: (Math.random() - 0.5) * 2, // Vitesse x aléatoire
                        vy: -Math.random() * 2 - 1, // Vitesse y vers le haut
                        size: Math.random() * 3 + 1, // Petite taille aléatoire
                        life: 30, // Durée de vie en frames
                    });
                }
            }

            // Mettre à jour et dessiner les particules
            for (let i = 0; i < snowParticles.length; i++) {
                let p = snowParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05; // Un peu de gravité pour la neige qui retombe
                p.life--;

                // Dessiner la particule (cercle blanc)
                ctx.fillStyle = "white";
                ctx.globalAlpha = p.life / 30; // Opacité diminue avec le temps
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1; // Restaurer l'opacité
            }

            // Supprimer les particules mortes
            snowParticles = snowParticles.filter(p => p.life > 0);
        }

        function drawEntities() {
            marmotte.dy += gravity;
            marmotte.y += marmotte.dy;

            // Collision avec le sol (Le sol vert commence à HORIZON_Y)
            if (marmotte.y + marmotte.size >= HORIZON_Y + 50) {
                marmotte.y = (HORIZON_Y + 50) - marmotte.size;
                marmotte.dy = 0;
                marmotte.grounded = true;
            }

            // --- Dessiner la marmotte ---
            // Tenter de dessiner l'image
            if (imgMarmotte.complete && imgMarmotte.naturalWidth > 0) {
                ctx.drawImage(imgMarmotte, marmotte.x, marmotte.y, marmotte.size, marmotte.size);
            } else {
                // Fallback (emoji) si l'image ne charge pas
                ctx.font = "60px Arial";
                ctx.fillText("🦫⛷️", marmotte.x, marmotte.y + marmotte.size); // Emoji marmotte + skis
            }
        }

        // --- Dessiner le décor de pente ---
        function drawScene() {
            // Ciel
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, HORIZON_Y);

            // Neige de la pente (dégradé pour plus de profondeur)
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, HORIZON_Y, canvas.width, canvas.height - HORIZON_Y);

            // "Rayures" du sol pour l'effet de vitesse et de perspective
            ctx.fillStyle = "#F0F8FF"; // Bleu très pâle
            const stripeWidth = 50;
            const stripeGap = 50;
            let stripeOffset = (frames * gameSpeed) % (stripeWidth + stripeGap);
            for (let y = HORIZON_Y; y < canvas.height; y += stripeGap) {
                ctx.fillRect(0, y + stripeOffset, canvas.width, stripeWidth);
            }
        }

        function handleObstacles() {
            // Apparition aléatoire
            if (frames % 90 === 0) {
                let type = Math.random() > 0.5 ? "rock" : "eagle";
                obstacles.push({
                    x: canvas.width,
                    y: type === "rock" ? (HORIZON_Y + 45) : (HORIZON_Y - 30), // Rocher au sol, aigle en l'air
                    size: type === "rock" ? 35 : 45, // Aigle un peu plus grand
                    type: type
                });
            }

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                // Tenter de dessiner l'image de l'obstacle
                if (obs.type === "eagle" && imgAigle.complete && imgAigle.naturalWidth > 0) {
                    ctx.drawImage(imgAigle, obs.x, obs.y, obs.size, obs.size);
                } else if (obs.type === "eagle") {
                    // Fallback (emoji) pour l'aigle
                    ctx.font = "45px Arial";
                    ctx.fillText("🦅", obs.x, obs.y + obs.size);
                } else {
                    // Rocher (emoji)
                    ctx.font = "35px Arial";
                    ctx.fillText("🪨", obs.x, obs.y + obs.size);
                }

                // Détection de collision simple (carré contre carré)
                if (marmotte.x < obs.x + obs.size - 10 && 
                    marmotte.x + marmotte.size - 10 > obs.x && 
                    marmotte.y < obs.y + obs.size - 10 && 
                    marmotte.y + marmotte.size - 10 > obs.y) {
                    isGameOver = true;
                }
            }

            // Supprime les obstacles passés pour libérer la mémoire
            obstacles = obstacles.filter(obs => obs.x + obs.size > 0);
        }

        function updateGame() {
            if (isGameOver) {
                document.getElementById("gameOverScreen").style.display = "block";
                document.getElementById("finalScore").innerText = score;
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawScene();
            handleSnow(); // Gérer la neige d'abord
            drawEntities(); // Dessiner la marmotte ensuite
            handleObstacles();

            score++;
            document.getElementById("score").innerText = Math.floor(score / 10);
            
            // Accélération légère
            if(score % 500 === 0) gameSpeed += 0.5;

            frames++;
            requestAnimationFrame(updateGame);
        }

        function resetGame() {
            marmotte.y = HORIZON_Y + 50;
            marmotte.dy = 0;
            obstacles = [];
            snowParticles = []; // Réinitialiser la neige
            score = 0;
            frames = 0;
            gameSpeed = 5;
            isGameOver = false;
            document.getElementById("gameOverScreen").style.display = "none";
            updateGame();
        }

        // Lancement du jeu au démarrage
        updateGame();

    </script>
</body>
</html>
