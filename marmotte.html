<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Fuite de la Marmotte</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: #87CEEB; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        h1 { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 60%, #4CAF50 60%, #2E7D32 100%);
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            max-width: 100%;
        }
        #scoreBoard {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .btn-back {
            margin-top: 20px;
            padding: 10px 20px;
            background: #e53935;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-back:hover { background: #b71c1c; }
        
        #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: none;
        }
    </style>
</head>
<body>

    <h1>⛰️ Cours, Marmotte, Cours !</h1>
    <div id="scoreBoard">Score : <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="800" height="300"></canvas>
    
    <div id="gameOverScreen">
        <h2 style="color: #c62828;">Aïe, attrapée par l'aigle !</h2>
        <p>Score final : <span id="finalScore">0</span></p>
        <button style="padding:10px 20px; font-size:18px; cursor:pointer; background:#2e7d32; color:white; border:none; border-radius:8px;" onclick="resetGame()">Rejouer</button>
    </div>

    <a href="index.html" class="btn-back">Retour à l'Atlas</a>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Variables du jeu
        let frames = 0;
        let score = 0;
        let gameSpeed = 5;
        let isGameOver = false;

        // La Marmotte
        const marmotte = {
            x: 50,
            y: 200,
            size: 40,
            dy: 0,
            jumpForce: 12,
            grounded: false,
            jumpTimer: 0
        };

        let obstacles = [];
        const gravity = 0.6;

        // Écouteurs pour sauter (Espace ou clic sur l'écran)
        window.addEventListener('keydown', function (e) {
            if (e.code === 'Space') {
                if (isGameOver) resetGame();
                else jump();
            }
        });
        canvas.addEventListener('touchstart', function() {
            if (isGameOver) resetGame();
            else jump();
        });
        canvas.addEventListener('mousedown', function() {
            if (isGameOver) resetGame();
            else jump();
        });

        function jump() {
            if (marmotte.grounded) {
                marmotte.dy = -marmotte.jumpForce;
                marmotte.grounded = false;
            }
        }

        function drawMarmotte() {
            marmotte.dy += gravity;
            marmotte.y += marmotte.dy;

            // Collision avec le sol (Le sol vert commence à 60% de la hauteur, soit y=180, mais avec la taille on ajuste)
            if (marmotte.y + marmotte.size >= 230) {
                marmotte.y = 230 - marmotte.size;
                marmotte.dy = 0;
                marmotte.grounded = true;
            }

            ctx.font = "40px Arial";
            ctx.fillText("🦫", marmotte.x, marmotte.y + marmotte.size); // Emoji marmotte (castor s'il n'y a pas marmotte)
        }

        function handleObstacles() {
            // Apparition aléatoire
            if (frames % 90 === 0) {
                let type = Math.random() > 0.5 ? "rock" : "eagle";
                obstacles.push({
                    x: canvas.width,
                    y: type === "rock" ? 195 : 120, // Rocher au sol, aigle en l'air
                    size: 35,
                    type: type
                });
            }

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                ctx.font = "35px Arial";
                ctx.fillText(obs.type === "rock" ? "🪨" : "🦅", obs.x, obs.y + obs.size);

                // Détection de collision simple (carré contre carré)
                if (marmotte.x < obs.x + obs.size - 10 && 
                    marmotte.x + marmotte.size - 10 > obs.x && 
                    marmotte.y < obs.y + obs.size - 10 && 
                    marmotte.y + marmotte.size - 10 > obs.y) {
                    isGameOver = true;
                }
            }

            // Supprime les obstacles passés pour libérer la mémoire
            obstacles = obstacles.filter(obs => obs.x + obs.size > 0);
        }

        function updateGame() {
            if (isGameOver) {
                document.getElementById("gameOverScreen").style.display = "block";
                document.getElementById("finalScore").innerText = score;
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawMarmotte();
            handleObstacles();

            score++;
            document.getElementById("score").innerText = Math.floor(score / 10);
            
            // Accélération légère
            if(score % 500 === 0) gameSpeed += 0.5;

            frames++;
            requestAnimationFrame(updateGame);
        }

        function resetGame() {
            marmotte.y = 200;
            marmotte.dy = 0;
            obstacles = [];
            score = 0;
            frames = 0;
            gameSpeed = 5;
            isGameOver = false;
            document.getElementById("gameOverScreen").style.display = "none";
            updateGame();
        }

        // Lancement du jeu au démarrage
        updateGame();

    </script>
</body>
</html>
