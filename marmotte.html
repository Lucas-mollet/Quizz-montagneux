<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Fuite de la Marmotte : TOUT SCHUSS !</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #111; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white;}
        #gameContainer { position: relative; width: 800px; height: 450px; overflow: hidden; border: 4px solid #333; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #gameCanvas { background: #8ecae6; display: block; width: 100%; height: 100%; }
        #scoreBoard { position: absolute; top: 10px; left: 10px; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 0 #000; z-index: 5;}
        
        /* Vidéo Intro */
        #videoContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20; display: flex; flex-direction: column; }
        #introVideo { width: 100%; height: 100%; object-fit: cover; }
        .btn-skip { position: absolute; bottom: 15px; right: 15px; padding: 8px 15px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #555; border-radius: 4px; cursor: pointer; z-index: 21; transition: 0.2s;}
        .btn-skip:hover { background: rgba(255,255,255,0.2); }

        /* Écrans overlay */
        #overlayScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; display: none; z-index: 15; }
        #overlayScreen h2 { color: #e74c3c; font-size: 32px; margin: 0 0 10px 0; }
        .btn-play { padding: 10px 20px; background: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; font-weight: bold;}
        .btn-play:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="videoContainer">
            <video id="introVideo" controls>
                <source src="ta-video-ici.mp4" type="video/mp4">
            </video>
            <button class="btn-skip" onclick="skipVideo()">Passer ➔</button>
        </div>

        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="scoreBoard">Distance: <span id="score">0</span>m</div>
        
        <div id="overlayScreen">
            <h2 id="overlayTitle">L'AIGLE T'A EU !</h2>
            <p>Score : <span id="finalScore">0</span>m</p>
            <button class="btn-play" onclick="resetGame()">RECHARGER</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- GESTION DES IMAGES ---
        const imgMarmotte = new Image();
        const imgAigle = new Image();

        // ⚠️ METS LES BONS NOMS EXACTS ICI (attention au .jpg vs .png)
        imgMarmotte.src = "marmotte.png"; 
        imgAigle.src = "aigle.png";

        let imagesLoaded = { marmotte: false, aigle: false };
        imgMarmotte.onload = () => { imagesLoaded.marmotte = true; };
        imgAigle.onload = () => { imagesLoaded.aigle = true; };

        // --- Paramètres de la Pente (Modifiés pour l'illusion de descente) ---
        const FOV = 250; 
        const HORIZON_Y = 80; // Très bas pour donner l'impression de plonger vers l'avant
        const CAMERA_Y = 300; // Caméra placée plus haut
        const WORLD_WIDTH = 1400; 
        
        let state = 'VIDEO'; 
        let frames = 0;
        let score = 0;
        
        // VITESSE RÉDUITE ET ÉQUILIBRÉE
        let targetSpeed = 35; 
        let currentSpeed = 35;
        let eagleDanger = 0; 
        
        // --- ENTITÉS ---
        let player = { x: 0, dx: 0, acc: 1.8, friction: 0.9, y: 0, vy: 0, z: 150, grounded: true };
        let eagle = { x: 0, y: -400, z: 600 }; 
        let obstacles = [];

        // --- CONTRÔLES ---
        let keys = { left: false, right: false };
        window.addEventListener('keydown', e => {
            if (state !== 'PLAY') return;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'Space' || e.code === 'ArrowUp') jump();
        });
        window.addEventListener('keyup', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        });
        function jump() { if (player.grounded) { player.vy = -20; player.grounded = false; } }

        function skipVideo() {
            document.getElementById("introVideo").pause();
            document.getElementById("videoContainer").style.display = "none";
            resetGame();
        }

        // --- MATHS 3D ---
        function project(x, y, z) {
            if (z < 1) z = 1;
            const scale = FOV / (FOV + z);
            const projX = (canvas.width / 2) + (x * scale);
            const projY = HORIZON_Y + ((y + CAMERA_Y) * scale);
            return { x: projX, y: projY, scale: scale };
        }

        // --- DÉCOR ---
        function drawBackground() {
            let skyGradient = ctx.createLinearGradient(0, 0, 0, HORIZON_Y);
            skyGradient.addColorStop(0, '#1a75ff'); skyGradient.addColorStop(1, '#8ecae6');
            ctx.fillStyle = skyGradient; ctx.fillRect(0, 0, canvas.width, HORIZON_Y);

            ctx.fillStyle = "#4f6c8c"; 
            ctx.beginPath(); ctx.moveTo(0, HORIZON_Y); ctx.lineTo(150, 20); ctx.lineTo(300, 70); ctx.lineTo(450, 10); ctx.lineTo(600, 60); ctx.lineTo(750, 30); ctx.lineTo(800, HORIZON_Y); ctx.fill();
            
            ctx.fillStyle = "#a3b8cc"; 
            ctx.beginPath(); ctx.moveTo(0, HORIZON_Y); ctx.lineTo(100, 50); ctx.lineTo(250, 80); ctx.lineTo(400, 40); ctx.lineTo(550, 70); ctx.lineTo(700, 50); ctx.lineTo(800, HORIZON_Y); ctx.fill();
        }

        function drawGround() {
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0, HORIZON_Y, canvas.width, canvas.height - HORIZON_Y);
            
            // Lignes de fuite pour renforcer l'illusion de pente plongeante
            ctx.strokeStyle = "rgba(200, 220, 240, 0.6)"; 
            ctx.lineWidth = 2;
            for(let i = -6; i <= 6; i++) {
                let start = project(i * 250, 0, 0);
                let end = project(i * 250, 0, 3000);
                if(start.y > HORIZON_Y) { 
                    ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke(); 
                }
            }
        }

        // --- MÉCANIQUE ---
        function handleObstacles() {
            if (frames % 20 === 0) {
                let rand = Math.random();
                let type = "tree";
                if (rand > 0.4) type = "rock";
                if (rand > 0.6) type = "grass"; 

                obstacles.push({
                    x: -WORLD_WIDTH/2 + Math.random() * WORLD_WIDTH,
                    y: 0, z: 2500, type: type,
                    width: type === "tree" ? 160 : (type === "grass" ? 280 : 100),
                    height: type === "tree" ? 280 : (type === "grass" ? 10 : 80)
                });
            }

            let onGrass = false;
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.z -= currentSpeed;
                if (obs.z > player.z - 30 && obs.z < player.z + 30) {
                    if (player.x > obs.x - obs.width/2 && player.x < obs.x + obs.width/2) {
                        if (obs.type === "tree") gameOver();
                        else if (obs.type === "rock" && player.y > -70) gameOver();
                        else if (obs.type === "grass" && player.grounded) onGrass = true;
                    }
                }
                if (obs.z < 0) obstacles.splice(i, 1);
            }

            if (onGrass) {
                currentSpeed = Math.max(12, currentSpeed - 2); 
                eagleDanger = Math.min(100, eagleDanger + 1.5); 
            } else {
                currentSpeed = Math.min(targetSpeed, currentSpeed + 0.5); 
                eagleDanger = Math.max(0, eagleDanger - 0.3); 
            }
            if (eagleDanger >= 100) gameOver(); 
        }

        // --- DESSIN DES ENTITÉS ---
        function drawEntities() {
            let renderList = [];
            obstacles.forEach(obs => renderList.push({ ...obs, isObstacle: true }));
            renderList.push({ x: player.x, y: player.y, z: player.z, width: 80, height: 80, isPlayer: true });

            eagle.x = player.x + Math.sin(frames*0.02)*150; 
            eagle.z = player.z + 300 - (eagleDanger * 2.5); 
            eagle.y = -300 + (eagleDanger * 2.5); 
            renderList.push({ x: eagle.x, y: eagle.y, z: eagle.z, width: 250, height: 120, isEagle: true });

            renderList.sort((a, b) => b.z - a.z); 

            renderList.forEach(item => {
                if (item.z <= 0) return;
                let p = project(item.x, item.y, item.z);
                let vw = item.width * p.scale; let vh = item.height * p.scale;

                ctx.save();
                ctx.translate(p.x, p.y);

                if (item.isObstacle) {
                    if (item.type === "tree") {
                        ctx.fillStyle = "#5d4037"; ctx.fillRect(-vw*0.1, -vh, vw*0.2, vh);
                        ctx.fillStyle = "#064e3b"; ctx.beginPath(); ctx.moveTo(0,-vh); ctx.lineTo(-vw/2,-vh*0.2); ctx.lineTo(vw/2,-vh*0.2); ctx.fill(); 
                    } else if (item.type === "rock") {
                        ctx.fillStyle = "#7f8c8d"; ctx.beginPath(); ctx.moveTo(-vw/2,0); ctx.lineTo(-vw/4,-vh); ctx.lineTo(vw/4,-vh); ctx.lineTo(vw/2,0); ctx.fill();
                    } else if (item.type === "grass") {
                        ctx.fillStyle = "#556b2f"; ctx.beginPath(); ctx.ellipse(0, 0, vw/2, vh*2, 0, 0, Math.PI*2); ctx.fill();
                    }
                }

                if (item.isPlayer) {
                    ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = vw*0.1; ctx.lineCap="round";
                    ctx.beginPath(); ctx.moveTo(-vw*0.3, 0); ctx.lineTo(-vw*0.4, vh*0.4); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(vw*0.3, 0); ctx.lineTo(vw*0.4, vh*0.4); ctx.stroke();
                    
                    if (imagesLoaded.marmotte) {
                        ctx.drawImage(imgMarmotte, -vw/2, -vh, vw, vh);
                    } else {
                        ctx.fillStyle = "#8e6e46"; ctx.fillRect(-vw/2, -vh, vw, vh); ctx.fillStyle="white"; ctx.fillText("Marmotte", -vw/2, -vh/2);
                    }
                }

                if (item.isEagle) {
                    if (imagesLoaded.aigle) {
                        ctx.drawImage(imgAigle, -vw/2, -vh/2, vw, vh);
                    } else {
                        ctx.fillStyle = "#222"; ctx.fillRect(-vw/2, -vh/2, vw, vh); ctx.fillStyle="white"; ctx.fillText("Aigle", -vw/2, 0);
                    }
                    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(0, -item.y * p.scale, vw*0.4, vw*0.1, 0, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            });
        }

        // --- LOGIQUE ---
        function updateGame() {
            if (state !== 'PLAY') return;
            frames++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (keys.left) player.dx -= player.acc;
            if (keys.right) player.dx += player.acc;
            player.dx *= player.friction; player.x += player.dx;
            
            player.x = Math.max(-WORLD_WIDTH/2, Math.min(WORLD_WIDTH/2, player.x));

            player.y += player.vy;
            if (!player.grounded) { player.vy += 1.6; if (player.y >= 0) { player.y = 0; player.grounded = true; player.vy = 0; } }

            score += (currentSpeed / 10);
            document.getElementById("score").innerText = Math.floor(score);

            drawBackground();
            drawGround();
            handleObstacles();
            drawEntities();
            
            requestAnimationFrame(updateGame);
        }

        function gameOver() {
            state = 'GAMEOVER';
            document.getElementById("overlayScreen").style.display = "flex";
            document.getElementById("finalScore").innerText = Math.floor(score);
        }

        function resetGame() {
            state = 'PLAY'; frames = 0; score = 0; currentSpeed = 35; eagleDanger = 0;
            obstacles = []; player.x = 0; player.y = 0; player.dx = 0;
            document.getElementById("overlayScreen").style.display = "none";
            updateGame();
        }

        requestAnimationFrame(updateGame);

    </script>
</body>
</html>
